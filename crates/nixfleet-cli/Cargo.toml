[package]
name = "nixfleet-cli"
description = "NixFleet v0.2 operator CLI: nixfleet (status), nixfleet-mint-token, nixfleet-derive-pubkey"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

# Top-level operator command: status (initial), rollout trace + diff
# planned. Reads CP URL + mTLS paths from CLI args / env.
[[bin]]
name = "nixfleet"
path = "src/bin/nixfleet.rs"

# Operator-side bootstrap-token minter. Run once per fleet host
# before first deploy; emits a one-shot signed token the agent
# uses on `/v1/enroll`.
[[bin]]
name = "nixfleet-mint-token"
path = "src/bin/mint_token.rs"

# Operator-side scratch helper: derive base64 ed25519 pubkey
# from a raw 32-byte private key file. Used once when initialising
# `nixfleet.trust.orgRootKey.current` in fleet.nix.
[[bin]]
name = "nixfleet-derive-pubkey"
path = "src/bin/derive_pubkey.rs"

[dependencies]
nixfleet-proto = { path = "../nixfleet-proto" }
nixfleet-canonicalize = { path = "../nixfleet-canonicalize" }
clap = { version = "4", features = ["derive", "env"] }
serde_json = "1"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
base64 = "0.22"
rand = "0.8"
hex = "0.4"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-native-roots", "json"] }

[dev-dependencies]
tempfile = "3"
