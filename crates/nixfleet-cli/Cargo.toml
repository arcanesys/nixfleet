[package]
name = "nixfleet-cli"
version = "0.2.0"
edition = "2021"
description = "NixFleet v0.2 operator CLI"
license = "MIT"
repository = "https://github.com/arcanesys/nixfleet"
homepage = "https://github.com/arcanesys/nixfleet"
authors = ["nixfleet contributors"]

[lib]
name = "nixfleet_cli"
path = "src/lib.rs"

[[bin]]
name = "nixfleet"
path = "src/main.rs"

# PR-5: nixfleet-mint-token. Operator-side tool that mints a
# bootstrap token (signed with the org root private key), one per
# new fleet host. Runs on the operator's workstation, not on lab.
[[bin]]
name = "nixfleet-mint-token"
path = "src/bin/mint_token.rs"

[dependencies]
nixfleet-proto = { path = "../nixfleet-proto" }
nixfleet-canonicalize = { path = "../nixfleet-canonicalize" }
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
comfy-table = "7"
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2 = "0.10"
base64 = "0.22"
rand = "0.8"
hex = "0.4"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
wiremock = "0.6"
