# Dormant. Lab forgejo (.forgejo/workflows/ci.yml) is the primary CI
# path - the operator pushes to host-05 as the source of truth. This
# workflow only runs if someone pushes the same ref to github, which
# is intended as off-site backup / second-opinion validation. The
# job spec here mirrors the forgejo workflow but uses hosted ubuntu
# runners (no native:host runner exists on github). Keep in sync
# with .forgejo/workflows/ci.yml when the validate matrix changes.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:00 UTC nightly. Keep early enough that a fix landing same-day
    # has the rest of the morning to verify before the next run.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  # PR/push runs of the same ref cancel each other; nightly runs do not
  # (each scheduled run is its own ref/sha and has its own group key).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    # Skipped on schedule - the nightly job's `validate --all` runs
    # `nix fmt --fail-on-change` as its first step.
    if: github.event_name != 'schedule'
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix fmt -- --ci

  validate:
    # Small tier - every PR + every push to main + manual dispatch.
    # `validate --rust` covers fmt + flake check + eval-tests + cargo
    # nextest + clippy + host builds + per-package builds. ~15-30 min.
    if: github.event_name != 'schedule'
    name: validate --rust (small tier)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run validate --rust
        run: nix run .#validate -- --rust
        env:
          NIX_CONFIG: "warn-dirty = false"

  nightly:
    # Full tier - scheduled nightly + manual dispatch. Adds every
    # fleet-harness-* scenario (smoke, teardown, rollback-policy,
    # auditor-chain, signed-roundtrip, deadline-expiry, secret-hygiene,
    # stale-target, boot-recovery, manifest-tamper-rejection,
    # corruption-rejection, module-rollouts-wire) and the fleet-N
    # scaling variants (fleet-2, fleet-5, fleet-10). 60-120 min.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: validate --all (full tier)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run validate --all
        run: nix run .#validate -- --all
        env:
          NIX_CONFIG: "warn-dirty = false"
